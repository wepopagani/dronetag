<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050f24" />
    <title>DroneTag — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        font-family: system-ui, -apple-system, sans-serif;
        background: #050f24;
        color: #e2e8f0;
        text-align: center;
      }
      .card {
        max-width: 22rem;
        width: 100%;
        border-radius: 1rem;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
        padding: 2rem 1.5rem;
      }
      h1 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { font-size: 0.875rem; line-height: 1.5; color: #94a3b8; margin-bottom: 1.25rem; }
      button {
        appearance: none;
        border: none;
        border-radius: 0.5rem;
        background: #f59e0b;
        color: #050f24;
        font-size: 0.875rem;
        font-weight: 600;
        padding: 0.625rem 1.25rem;
        cursor: pointer;
      }
      button:active { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sei offline</h1>
      <p>DroneTag ha bisogno di una connessione per sincronizzare i dati. Riprova quando torni online.</p>
      <button type="button" onclick="location.reload()">Riprova</button>
    </div>
  </body>
</html>
