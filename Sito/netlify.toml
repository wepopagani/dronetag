# Netlify build configuration for DroneTag.
#
# Next.js 16 + React 19 require Node >= 20.9. Netlify's default builder ships
# Node 18, which is *too old* and produces an opaque `exit 254` failure during
# `next build`. Pin the Node version explicitly here so every deploy (and every
# branch / preview) gets a known-good runtime.
#
# `@netlify/plugin-nextjs` is auto-installed by Netlify when it detects a
# Next.js app at the repo root; do NOT add it under `[[plugins]]` again unless
# Netlify Support tells you to pin a specific version.

[build]
  command  = "npm run build"
  publish  = ".next"

[build.environment]
  NODE_VERSION  = "22"
  NPM_VERSION   = "10"
  # Defaults that match docs/DEPLOY_STAGING.md §4 — flip to "true" on the
  # Netlify UI (not here) once CSP report-only has been clean for 48h.
  CSP_ENFORCE          = "false"
  APP_CHECK_ENFORCE    = "true"

# The Functions workspace (`functions/`) is deployed via the Firebase CLI,
# not Netlify. Skip it from the Netlify build so its own engines.node ("20")
# and CommonJS output don't bleed into the Next.js build.
[functions]
  included_files = ["!functions/**"]

# Healthcheck redirect for uptime monitors that prefer the short path.
[[redirects]]
  from   = "/health"
  to     = "/api/health"
  status = 200
